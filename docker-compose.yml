# Create a .env file to override defaults:
#   COUCHDB_PASSWORD=<strong-password>
#   VAULT_NAME=MyVault
#   MCP_AUTH_TOKEN=<password-for-mcp>
#   LIVESYNC_USER=livesync          (optional, recommended)
#   LIVESYNC_PASSWORD=<password>    (optional, recommended)
#
# Chunking must match your LiveSync plugin settings (Settings > Sync Settings > Advanced):
#   LIVESYNC_CHUNK_SIZE=0           (customChunkSize, default 0 = 100 KB max per chunk)
#   LIVESYNC_MINIMUM_CHUNK_SIZE=20  (minimumChunkSize)
#   LIVESYNC_HASH_ALG=xxhash64      (hashAlg)
#   LIVESYNC_CHUNK_SPLITTER_VERSION=v3-rabin-karp  (chunkSplitterVersion)

services:
  couchdb:
    image: couchdb:3
    ports:
      - "5984:5984"  # Exposed for Obsidian LiveSync plugin to connect
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?Set COUCHDB_PASSWORD in .env}
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./deploy/mcp-with-db/couchdb-init.ini:/opt/couchdb/etc/local.d/livesync.ini

  mcp:
    image: ghcr.io/es617/obsidian-sync-mcp:latest
    ports:
      - "8787:8787"
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?Set COUCHDB_PASSWORD in .env}
      COUCHDB_DATABASE: ${COUCHDB_DATABASE:-obsidian}
      VAULT_NAME: ${VAULT_NAME:-MyVault}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      BASE_URL: ${BASE_URL:-http://localhost:8787}
      LIVESYNC_CHUNK_SIZE: ${LIVESYNC_CHUNK_SIZE:-}
      LIVESYNC_MINIMUM_CHUNK_SIZE: ${LIVESYNC_MINIMUM_CHUNK_SIZE:-}
      LIVESYNC_HASH_ALG: ${LIVESYNC_HASH_ALG:-}
      LIVESYNC_CHUNK_SPLITTER_VERSION: ${LIVESYNC_CHUNK_SPLITTER_VERSION:-}
    depends_on:
      - couchdb

volumes:
  couchdb_data:
